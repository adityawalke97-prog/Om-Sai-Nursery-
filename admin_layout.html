<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard | Om Sai Nursery{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin1.css') }}">
    
    <style>
        /* Kahich basic fixes jar CSS madhe nastil tar */
        :root {
            --sidebar-width: 280px;
            --primary: #22c55e;
        }

        .nav-item {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            background: rgba(34, 197, 94, 0.1);
            color: var(--primary) !important;
            border-right: 4px solid var(--primary);
        }

        .badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <i data-lucide="leaf" class="logo-icon" style="color: #22c55e;"></i>
        <h2 style="letter-spacing: -1px;">Om Sai <span style="font-weight: 400; font-size: 0.8rem; color: #94a3b8;">Admin</span></h2>
    </div>

    <!-- Admin Profile Section -->
    <div class="user-profile">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; color: white;">
            A
        </div>
        <div>
            <p style="font-size: 13px; font-weight: 600; margin: 0; color: white;">Admin User</p>
            <p style="font-size: 11px; margin: 0; color: #94a3b8;">Super Admin</p>
        </div>
    </div>

    <div class="nav-links">
        <a href="/admin" class="nav-item {% if active=='dashboard' %}active{% endif %}">
            <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
        </a>

        <a href="/admin/add_product" class="nav-item {% if active=='add_product' %}active{% endif %}">
            <i data-lucide="plus-circle"></i> <span>Add Product</span>
        </a>

        <a href="/admin/products" class="nav-item {% if active=='manage_products' %}active{% endif %}">
            <i data-lucide="package"></i> <span>Manage Products</span>
        </a>

        <a href="/admin/orders" class="nav-item {% if active=='orders' %}active{% endif %}">
            <i data-lucide="shopping-cart"></i> <span>Orders</span>
            <!-- Example Badge -->
        </a>

        <a href="/admin/customers" class="nav-item {% if active=='customers' %}active{% endif %}">
            <i data-lucide="users"></i> <span>Customers</span>
        </a>

        <a href="/admin/feedbacks" class="nav-item {% if active=='feedbacks' %}active{% endif %}">
            <i data-lucide="message-square"></i> <span>Feedbacks</span>
        </a>
        
        <div class="sidebar-footer" style="margin-top: auto; padding-top: 20px;">
            <a href="/" class="nav-item" target="_blank" style="margin-bottom: 5px;">
                <i data-lucide="external-link"></i> <span>Visit Shop</span>
            </a>
            <a href="/logout" class="nav-item logout" style="color: #ef4444;">
                <i data-lucide="log-out"></i> <span>Logout</span>
            </a>
        </div>
    </div>
</div>

<div class="main">
    <div class="content-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">{% block header_title %}Admin Control Panel{% endblock %}</h1>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">Welcome back! Here's what's happening today.</p>
        </div>
        
        <!-- Top bar Search/Actions -->
        <div style="display: flex; gap: 15px;">
             <button class="nav-item" style="border:none; background:none; cursor:pointer;"><i data-lucide="bell"></i></button>
             <button class="nav-item" style="border:none; background:none; cursor:pointer;"><i data-lucide="settings"></i></button>
        </div>
    </div>
    
    <div class="glass-panel" style="margin-top: 25px;">
        {% block content %}
        <!-- Child templates will inject content here -->
        {% endblock %}
    </div>
</div>

<script>
    // Initialize Icons
    lucide.createIcons();

    // Fade in effect for content
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelector('.main').style.opacity = "1";
    });
</script>

</body>
</html>
