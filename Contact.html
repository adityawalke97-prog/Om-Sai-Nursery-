<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 900px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            text-align: center;
        }
        .map-frame {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            border: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="contact-card">
    <h1>Get in Touch</h1>
    <p>Visit us at our location or drop a message.</p>
    
    <iframe class="map-frame" 
            src="{{ map_url }}" 
            allowfullscreen="" 
            loading="lazy">
    </iframe>
</div>

</body>
</html>
