{% extends "admin_layout.html" %}

{% block header_title %}Customer Reviews{% endblock %}

{% block content %}
<div class="header" style="margin-bottom: 25px;">
    <h1><i data-lucide="message-square"></i> Feedbacks</h1>
    <p>What customers are saying about Om Sai Nursery.</p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for f in feedbacks %}
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
            <div>
                <h4 style="margin: 0; color: white;">{{ f[1] }}</h4>
                <small style="color: #22c55e;">Product: {{ f[2] }}</small>
            </div>
            <span style="font-size: 11px; color: #64748b;">{{ f[4] }}</span>
        </div>
        <p style="margin: 0; color: #94a3b8; font-style: italic; font-size: 0.9rem;">"{{ f[3] }}"</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
