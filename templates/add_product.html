<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product | Supplier Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #0f172a; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; color: white; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .form-container { 
            background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        h2 { color: var(--primary); margin-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #94a3b8; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-submit { 
            width: 100%; padding: 15px; border-radius: 10px; background: var(--primary); 
            color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #219150; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2><i class="fas fa-leaf"></i> Add New Product</h2>
    <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Fill in the details to list your product.</p>

    <form action="/supplier/add_product" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" placeholder="e.g. Bonsai Tree" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" name="price" required>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" required>
            </div>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category">
                <option value="plant">Plants</option>
                <option value="seed">Seeds</option>
                <option value="fertilizer">Fertilizer</option>
            </select>
        </div>

        <div class="form-group">
            <label>Product Image</label>
            <input type="file" name="image" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">Publish Product</button>
    </form>

    <a href="/supplier" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>

</body>
</html>
