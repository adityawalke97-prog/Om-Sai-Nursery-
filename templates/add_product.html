{% extends "supplier.html" %}

{% block title %}Add Product | Om Sai Nursery{% endblock %}

{% block header_title %}Add New Inventory{% endblock %}

{% block content %}
<!-- Modern Form UI -->
<div class="form-container" style="animation: fadeIn 0.5s ease;">
    <p style="color:#64748b; margin-bottom: 25px;">List your premium plants and reach thousands of customers.</p>

    <form action="/admin/add_product" method="POST" enctype="multipart/form-data">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">
                <i data-lucide="type" style="width:16px; vertical-align:middle;"></i> Product Name
            </label>
            <input type="text" name="name" placeholder="e.g. Rare Indoor Monstera" required 
                   style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">Price (₹)</label>
                <input type="number" name="price" min="0" placeholder="299" required
                       style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white;">
            </div>
            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">Available Stock</label>
                <input type="number" name="stock" min="1" placeholder="50" required
                       style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">Category</label>
                <select name="category" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white;">
                    <option value="plant">🌿 Plants</option>
                    <option value="seed">🌻 Seeds</option>
                    <option value="fertilizer">🧪 Fertilizer</option>
                    <option value="pot">🏺 Pots & Decor</option>
                </select>
            </div>
            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">Product Image</label>
                <div class="upload-area" onclick="document.getElementById('fileInput').click();" 
                     style="border:2px dashed rgba(255,255,255,0.1); padding:15px; border-radius:12px; text-align:center; cursor:pointer; background:rgba(255,255,255,0.02);">
                    <i data-lucide="image-plus" id="uploadIcon"></i>
                    <p id="uploadText" style="font-size: 12px; margin: 5px 0;">Click to upload</p>
                    <input type="file" id="fileInput" name="image" accept="image/*" required style="display:none;" onchange="previewFile()">
                    <img id="imagePreview" src="" alt="Preview" style="width:60px; height:60px; object-fit:cover; border-radius:8px; display:none; margin:0 auto;">
                </div>
            </div>
        </div>

        <button type="submit" style="width:100%; padding:16px; border-radius:12px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
            <i data-lucide="cloud-upload"></i> Publish to Marketplace
        </button>
    </form>
</div>

<script>
    function previewFile() {
        const preview = document.getElementById('imagePreview');
        const file = document.getElementById('fileInput').files[0];
        const icon = document.getElementById('uploadIcon');
        const text = document.getElementById('uploadText');
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "block";
            icon.style.display = "none";
            text.style.display = "none";
        }
        if (file) { reader.readAsDataURL(file); }
    }
</script>
{% endblock %}
