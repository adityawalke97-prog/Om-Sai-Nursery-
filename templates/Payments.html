{% extends "Home.html" %}
{% block content %}

<div class="pay-container">
    <div class="pay-header">
        <h2><i class="fas fa-wallet"></i> Secure Payment Gateway</h2>
        <p>Select an order to complete your payment</p>
    </div>

    <div class="pay-grid">
        <div class="pending-orders">
            <h3><i class="fas fa-clock"></i> Pending Payments</h3>
            <div id="pending-list">
                <p style="color:#64748b; padding:20px;">Fetching your orders...</p>
            </div>
        </div>

        <div class="payment-methods" id="payment-box" style="display: none;">
            <h3><i class="fas fa-credit-card"></i> Choose Payment Method</h3>
            <div class="selected-summary">
                <span>Selected Order Total:</span>
                <strong id="pay-amount">₹0</strong>
            </div>

            <div class="method-options">
                <label class="method-item">
                    <input type="radio" name="pay-type" value="UPI" checked>
                    <div class="method-detail">
                        <i class="fas fa-mobile-alt"></i>
                        <span>UPI (GPay/PhonePe/Paytm)</span>
                    </div>
                </label>
                <label class="method-item">
                    <input type="radio" name="pay-type" value="CARD">
                    <div class="method-detail">
                        <i class="far fa-credit-card"></i>
                        <span>Debit/Credit Card</span>
                    </div>
                </label>
                <label class="method-item">
                    <input type="radio" name="pay-type" value="COD">
                    <div class="method-detail">
                        <i class="fas fa-truck"></i>
                        <span>Cash on Delivery</span>
                    </div>
                </label>
            </div>

            <button class="pay-now-btn" id="finalPayBtn" onclick="processPayment()">
                <span id="btnText">Confirm & Pay Now</span>
            </button>
        </div>
    </div>

    <div class="payment-history">
        <h3><i class="fas fa-history"></i> Payment History</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>
</div>

<style>
    :root { --primary: #2ecc71; --dark: #0f172a; --card-bg: #1e293b; }
    .pay-container { max-width: 1100px; margin: 30px auto; padding: 20px; color: white; }
    .pay-header { margin-bottom: 30px; text-align: center; }
    .pay-header h2 { font-size: 28px; color: var(--primary); }

    .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }

    /* Pending Orders Styling */
    .pending-orders, .payment-methods, .payment-history { 
        background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); 
    }
    
    .order-card { 
        background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 12px; margin-bottom: 12px;
        border: 1px solid #334155; cursor: pointer; transition: 0.3s;
    }
    .order-card:hover { border-color: var(--primary); }
    .order-card.selected { border-color: var(--primary); background: rgba(46, 204, 113, 0.1); }

    /* Payment Methods Styling */
    .selected-summary { background: #0f172a; padding: 15px; border-radius: 12px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    .selected-summary strong { font-size: 20px; color: var(--primary); }

    .method-options { margin-top: 15px; }
    .method-item { display: block; margin-bottom: 10px; cursor: pointer; }
    .method-item input { display: none; }
    .method-detail { 
        display: flex; align-items: center; gap: 15px; padding: 15px; background: #0f172a; 
        border: 1px solid #334155; border-radius: 12px; transition: 0.3s;
    }
    .method-item input:checked + .method-detail { border-color: var(--primary); background: rgba(46, 204, 113, 0.05); }

    .pay-now-btn { 
        width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px;
        color: #052e16; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; 
    }

    /* History Table */
    .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .history-table th, .history-table td { text-align: left; padding: 15px; border-bottom: 1px solid #334155; }
    .status-success { color: var(--primary); font-weight: bold; font-size: 12px; }

    @media (max-width: 768px) { .pay-grid { grid-template-columns: 1fr; } }
</style>

<script>
    let activeOrderId = null;
    let activeOrderAmount = 0;

    // Simulation of Orders coming from Backend (Aap ise Fetch se bhi replace kar sakte hain)
    const mockOrders = [
        {id: "ORD9921", total: 2449, items: "Majestic Bonsai, Pot", date: "2024-05-20"},
        {id: "ORD8830", total: 850, items: "Organic Fertilizer", date: "2024-05-19"}
    ];

    function loadPendingOrders() {
        const list = document.getElementById('pending-list');
        list.innerHTML = "";
        
        mockOrders.forEach(order => {
            list.innerHTML += `
                <div class="order-card" onclick="selectOrder(this, '${order.id}', ${order.total})">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${order.id}</strong>
                        <span style="color:var(--primary)">₹${order.total}</span>
                    </div>
                    <small style="color:#64748b">${order.items}</small>
                </div>
            `;
        });
    }

    function selectOrder(el, id, amount) {
        document.querySelectorAll('.order-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        
        activeOrderId = id;
        activeOrderAmount = amount;
        
        document.getElementById('payment-box').style.display = 'block';
        document.getElementById('pay-amount').innerText = "₹" + amount;
        document.getElementById('finalPayBtn').innerText = `Confirm & Pay ₹${amount}`;
    }

    function processPayment() {
        const btn = document.getElementById('finalPayBtn');
        const method = document.querySelector('input[name="pay-type"]:checked').value;
        
        btn.disabled = true;
        btn.innerText = "Processing Transaction...";

        setTimeout(() => {
            alert(`Payment of ₹${activeOrderAmount} successful via ${method}!`);
            
            // Add to history table
            const historyBody = document.getElementById('history-body');
            const row = `
                <tr>
                    <td>${activeOrderId}</td>
                    <td>${new Date().toLocaleDateString()}</td>
                    <td>₹${activeOrderAmount}</td>
                    <td>${method}</td>
                    <td><span class="status-success"><i class="fas fa-check-circle"></i> PAID</span></td>
                </tr>
            `;
            historyBody.insertAdjacentHTML('afterbegin', row);

            // UI Reset
            document.getElementById('payment-box').style.display = 'none';
            // Asli app mein yahan backend API call hogi to remove pending order
        }, 2000);
    }

    // Initial Load
    loadPendingOrders();
</script>

{% endblock %}
