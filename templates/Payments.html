<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Om Sai Nursery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --dark: #0f172a; --card-bg: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--dark); color: white; padding: 20px; display: flex; justify-content: center; }

        .checkout-container {
            width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 40px;
        }

        /* Payment Methods Section */
        .payment-box { background: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .method-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .tab { 
            padding: 10px 20px; cursor: pointer; border-radius: 10px; font-size: 14px; 
            transition: 0.3s; color: #94a3b8; border: 1px solid transparent;
        }
        .tab.active { background: rgba(46, 204, 113, 0.1); color: var(--primary); border: 1px solid var(--primary); }

        .method-content { display: none; }
        .method-content.active { display: block; animation: fadeIn 0.4s; }

        /* Input Styles */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; 
            border-radius: 10px; color: white; outline: none;
        }

        /* Order Summary Section */
        .summary-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; height: fit-content; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #94a3b8; }
        .total-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #334155; font-size: 20px; font-weight: bold; }

        .btn-pay { 
            width: 100%; padding: 15px; background: var(--primary); border: none; 
            border-radius: 12px; color: #052e16; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="checkout-container">
    <!-- Left Side: Methods -->
    <div class="payment-box">
        <h2 style="margin-bottom: 20px;">Payment Method</h2>
        
        <div class="method-tabs">
            <div class="tab active" onclick="showMethod('upi')"><i class="fas fa-mobile-alt"></i> UPI</div>
            <div class="tab" onclick="showMethod('card')"><i class="fas fa-credit-card"></i> Card</div>
            <div class="tab" onclick="showMethod('net')"><i class="fas fa-university"></i> Net Banking</div>
            <div class="tab" onclick="showMethod('cod')"><i class="fas fa-truck"></i> COD</div>
        </div>

        <!-- UPI Content -->
        <div id="upi" class="method-content active">
            <p style="color: #94a3b8; margin-bottom: 15px;">Pay using PhonePe, Google Pay or Paytm</p>
            <div class="input-group">
                <label>Enter UPI ID</label>
                <input type="text" placeholder="username@okaxis">
            </div>
            <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 24px; color: #64748b;">
                <i class="fab fa-google-pay"></i> <i class="fab fa-apple-pay"></i> <i class="fas fa-qrcode"></i>
            </div>
        </div>

        <!-- Card Content -->
        <div id="card" class="method-content">
            <div class="input-group"><label>Card Number</label><input type="text" placeholder="xxxx xxxx xxxx xxxx"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group"><label>Expiry</label><input type="text" placeholder="MM/YY"></div>
                <div class="input-group"><label>CVV</label><input type="password" placeholder="***"></div>
            </div>
        </div>

        <!-- Net Banking -->
        <div id="net" class="method-content">
            <label>Select Your Bank</label>
            <select style="width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 10px;">
                <option>SBI Bank</option>
                <option>HDFC Bank</option>
                <option>ICICI Bank</option>
                <option>Axis Bank</option>
            </select>
        </div>

        <!-- COD -->
        <div id="cod" class="method-content">
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border-left: 4px solid #f1c40f;">
                <p>Cash on Delivery available. Extra ₹40 handling charges may apply.</p>
            </div>
        </div>

        <button class="btn-pay" onclick="processPayment()">Complete Order</button>
    </div>

    <!-- Right Side: Summary -->
    <div class="summary-box">
        <h3 style="margin-bottom: 20px;">Order Summary</h3>
        <div class="price-row"><span>Majestic Bonsai x 1</span><span>₹1,999</span></div>
        <div class="price-row"><span>Ceramic Pot x 1</span><span>₹450</span></div>
        <div class="price-row"><span>Shipping</span><span style="color: #2ecc71;">FREE</span></div>
        <div class="total-row"><span>Total</span><span>₹2,449</span></div>
        
        <div style="margin-top: 30px; font-size: 12px; color: #64748b; text-align: center;">
            <i class="fas fa-shield-alt"></i> 100% Safe & Secure Payments
        </div>
    </div>
</div>

<script>
    function showMethod(id) {
        // Hide all
        document.querySelectorAll('.method-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        
        // Show selected
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function processPayment() {
        alert("Redirecting to Secure Payment Gateway...");
        // Yahan par Razorpay ya Stripe ka API call hota hai
    }
</script>

</body>
</html>
