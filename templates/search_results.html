{% extends "Home.html" %}

{% block content %}

<h2>🔍 Search Results for "{{ query }}"</h2>

<div id="products">

{% for item in results %}

<div class="plant-card">

    <h3>{{ item['name'] }}</h3>

    <img src="{{ url_for('static', filename='images/' + item['image']) }}" width="150">

    <p><b>Price:</b> ₹{{ item['price'] }}</p>

    <p><b>Category:</b> {{ item['category'] }}</p>

</div>

{% else %}
    <p>No results found 😢</p>
{% endfor %}

</div>

{% endblock %}
