<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Sai Plant Nursery - Best Online Plant Store</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<div class="container" id="container">

    <div class="form-container sign-in-container">
        <form action="/login" method="POST">
            <h1>Sign In</h1>
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="password" name="password" placeholder="Enter Password" required>

            <select name="role" required>
                <option value="customer">Customer</option>
                <option value="supplier">Supplier</option>
                <option value="admin">Admin</option>
            </select>

            <button type="submit">Login</button>
        </form>
    </div>

    <div class="form-container sign-up-container">
        <form id="signupForm">
            <h1>Create Account</h1>

            <input type="text" name="name" placeholder="Enter your name" required>

            <input type="email" name="email" placeholder="Enter your email" required>

            <input type="text" 
                   name="mobile" 
                   placeholder="Enter 10 Digit Mobile Number" 
                   required 
                   pattern="[0-9]{10}" 
                   maxlength="10">

            <input type="password" name="password" placeholder="Password" required>

            <select name="role" required>
                <option value="customer">Customer</option>
                <option value="supplier">Supplier</option>
                <option value="admin">Admin</option>
            </select>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>Welcome Back!</h1>
                <p>To keep connected with us please login with your personal info</p>
                <button class="ghost" id="signIn">Sign In</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>Hello, Friend!</h1>
                <p>Enter your personal details and start journey with us</p>
                <button class="ghost" id="signUp">Sign Up</button>
            </div>
        </div>
    </div>
</div>

<script>
    const signUpBtn = document.getElementById("signUp");
    const signInBtn = document.getElementById("signIn");
    const container = document.getElementById("container");

    signUpBtn.onclick = () => container.classList.add("right-panel-active");
    signInBtn.onclick = () => container.classList.remove("right-panel-active");

    /* ---------- SIGN UP LOGIC (FIXED) ---------- */
    document.getElementById("signupForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        fetch("/signup", {
            method: "POST",
            body: formData
        })
        .then(async res => {
            const message = await res.text(); // Python se aaya message (Success ya Error)
            
            if (res.ok) {
                // Agar status 200 (Success) hai
                alert(message); 
                container.classList.remove("right-panel-active"); // Login panel par bhej do
                this.reset();
            } else {
                // Agar status 400 (Duplicate Email) ya koi aur error hai
                alert(message); 
            }
        })
        .catch(err => {
            alert("Server connection failed! Check if Flask is running.");
            console.error(err);
        });
    });
</script>

</body>
</html>
