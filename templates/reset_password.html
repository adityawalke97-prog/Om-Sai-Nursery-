<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Om Sai Nursery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#f4f4f4;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
            width:90%;
            max-width:400px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#2e7d32;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#2e7d32;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1b5e20;
        }

        .back{
            text-align:center;
            margin-top:15px;
        }

        .back a{
            text-decoration:none;
            color:#2e7d32;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <form method="POST" action="/reset-password">

        <input
            type="password"
            name="password"
            placeholder="Enter New Password"
            required
        >

        <input
            type="password"
            name="confirm_password"
            placeholder="Confirm New Password"
            required
        >

        <button type="submit">
            Update Password
        </button>

    </form>

    <div class="back">
        <a href="/login">Back to Login</a>
    </div>
</div>

</body>
</html>
