{% extends "Home.html" %}
{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
    /* Desktop default styling */
    .orders-container { padding: 15px; font-family: sans-serif; }
    #map { width: 100%; height: 350px; border-radius: 12px; border: 2px solid #2e7d32; margin-top: 10px; }
    
    .cart-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; border-radius: 10px; overflow: hidden; }
    .cart-table th, .cart-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    .cart-table th { background-color: #2e7d32; color: white; }

    .buy-btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .remove-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; }

    /* ================= MOBILE FIXED CSS (No Overlap) ================= */
    @media (max-width: 600px) {
        .cart-table, thead, tbody, tfoot, tr, td { display: block; width: 100%; }
        thead { display: none; } /* Header hide */
        
        tr { 
            background: #ffffff; 
            margin-bottom: 15px; 
            border: 1px solid #2e7d32 !important; 
            border-radius: 12px; 
            padding: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        td { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: none !important; 
            padding: 8px 5px !important;
            border-bottom: 1px dashed #eee !important;
        }

        td:last-child { border-bottom: none !important; }

        /* Left side label labels */
        td::before { 
            content: attr(data-label); 
            font-weight: bold; 
            color: #2e7d32; 
            font-size: 14px;
        }

        #grand-total-container {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            border: 2px solid #2e7d32;
        }
    }
</style>

<div class="orders-container">
    <h2>🛒 My Orders</h2>
    
    <table class="cart-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-table-body">
            </tbody>
    </table>

    <div id="grand-total-container">
        Grand Total: <span id="grand-total-val">₹0</span>
    </div>

    <h3 style="margin-top:25px;">📍 Delivery Location</h3>
    <input type="text" id="location-input" readonly placeholder="Click on map to select location" 
           style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
    
    <div id="map"></div>

    <button class="buy-btn" onclick="buyNow()">Place Order Now</button>
</div>

<script>
    // ================= MAP LOGIC =================
    let map = L.map('map').setView([18.5204, 73.8567], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let marker;
    map.on('click', function(e) {
        let lat = e.latlng.lat;
        let lon = e.latlng.lng;
        if(marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map);
        document.getElementById("location-input").value = lat.toFixed(4) + ", " + lon.toFixed(4);
        
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                if(data.display_name) document.getElementById("location-input").value = data.display_name;
            });
    });

    // ================= CART LOGIC =================
    function loadCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let tbody = document.getElementById("cart-table-body");
        tbody.innerHTML = "";
        let total = 0;

        if(cart.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Cart is empty</td></tr>";
        }

        cart.forEach((item, i) => {
            let subtotal = item.price * item.quantity;
            total += subtotal;
            tbody.innerHTML += `
                <tr>
                    <td data-label="Item No.">${i+1}</td>
                    <td data-label="Product"><strong>${item.name}</strong></td>
                    <td data-label="Quantity">${item.quantity}</td>
                    <td data-label="Price">₹${item.price}</td>
                    <td data-label="Subtotal">₹${subtotal}</td>
                    <td data-label="Action"><button class="remove-btn" onclick="removeItem(${i})">Remove</button></td>
                </tr>`;
        });
        document.getElementById("grand-total-val").innerText = "₹" + total;
    }

    function removeItem(i) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(i, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }

    function buyNow() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let loc = document.getElementById("location-input").value;
        if(cart.length === 0) return alert("Cart khali hai!");
        if(!loc) return alert("Please select location on map!");

        fetch("/confirm_order", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({cart, location: loc})
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Order Success!");
                localStorage.removeItem("cart");
                window.location.href="/payments";
            }
        });
    }

    loadCart();
</script>
{% endblock %}
