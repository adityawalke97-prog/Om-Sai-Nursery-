<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Om Sai Nursery{% endblock %}</title>

    <meta name="description" content="Best plant nursery in Pune. Buy plants online.">
    <meta name="theme-color" content="#2e7d32">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body>
    <div class="area">
        <ul class="circles">
            <li><i class="fa-solid fa-leaf"></i></li>
            <li><i class="fa-solid fa-seedling"></i></li>
            <li><i class="fa-solid fa-tree"></i></li>
            <li><i class="fa-solid fa-spa"></i></li>
            <li><i class="fa-solid fa-leaf"></i></li>
        </ul>
    </div>

    <nav class="top-nav">
        <div class="nav-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
            <div class="logo">
                <i class="fa-solid fa-seedling"></i> <span>Om Sai</span>
            </div>
        </div>

        <div class="search-bar">
            <form action="{{ url_for('search') }}" method="GET">
                <input type="text" name="q" placeholder="Search plants...">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </div>

        <div class="user-actions">
            <button class="theme-toggle" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
            </button>
            <div class="profile-trigger" onclick="toggleProfile()">
                <i class="fa-solid fa-circle-user fa-xl"></i>
                <div class="profile-box" id="profileBox">
                    <p><strong>{{ session['username']|default('Guest') }}</strong></p>
                    <hr>
                    <a href="/logout"><i class="fa-solid fa-power-off"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Menu</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
            </div>
            <ul class="nav-links">
                <li><a href="/home" class="active"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="/plants"><i class="fa-solid fa-leaf"></i> Plants</a></li>
                <li><a href="/seeds"><i class="fa-solid fa-spa"></i> Seeds</a></li>
                <li><a href="/diseases"><i class="fa-solid fa-bug"></i> Diseases</a></li>
                <li><a href="/orders"><i class="fa-solid fa-cart-shopping"></i> My Orders</a></li>
                <li><a href="/contact"><i class="fa-solid fa-phone"></i> Contact</a></li>
            </ul>
        </aside>

        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="mobile-nav">
        <a href="/home" class="mob-nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/plants" class="mob-nav-item">
            <i class="fa-solid fa-leaf"></i>
            <span>Plants</span>
        </a>
        <a href="/orders" class="mob-nav-item">
            <div class="cart-badge-container">
                <i class="fa-solid fa-basket-shopping"></i>
                <span class="cart-count">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="https://wa.me/919999999999" class="mob-nav-item">
            <i class="fa-brands fa-whatsapp"></i>
            <span>Chat</span>
        </a>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            
            // Mobile vibration for native feel
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function toggleProfile() {
            const box = document.getElementById("profileBox");
            box.classList.toggle('show');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            const isDark = document.body.classList.contains('dark-mode');
            icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fa-solid fa-sun';
            }
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.querySelectorAll('.cart-count').forEach(el => el.innerText = cart.length);
        };
    </script>
</body>
</html>
