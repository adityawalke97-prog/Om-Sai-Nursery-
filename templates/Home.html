<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Om Sai Nursery{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* --- SIRF MOBILE KE LIYE CHANGES (Desktop Safe) --- */
        @media screen and (max-width: 768px) {
            /* Desktop ki background animation hide */
            .area, .circles { display: none !important; }

            /* Sidebar ko hide karke mobile drawer banana */
            .sidebar {
                position: fixed !important;
                left: -100% !important;
                top: 0;
                width: 280px !important;
                height: 100vh !important;
                background: white !important;
                z-index: 10001 !important;
                transition: 0.4s ease;
                display: block !important;
                box-shadow: 10px 0 20px rgba(0,0,0,0.2);
            }
            .sidebar.active { left: 0 !important; }

            /* Desktop ki top-nav ko fix karna */
            .top-nav {
                display: flex !important;
                justify-content: space-between !important;
                padding: 10px 15px !important;
                background: white !important;
                height: 60px !important;
                align-items: center !important;
            }
            .search-bar, .weather-widget, .lang-switch, .floating-cart { display: none !important; }

            /* Mobile Bottom Bar */
            .mob-app-nav {
                display: flex !important;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: white;
                height: 70px;
                box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
                justify-content: space-around;
                align-items: center;
                z-index: 10000;
                border-radius: 20px 20px 0 0;
            }
            .mob-app-nav a { text-decoration: none; color: #666; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
            .mob-app-nav i { font-size: 20px; margin-bottom: 4px; }
            .mob-app-nav a.active { color: #059669; font-weight: bold; }

            .content-area { padding-bottom: 80px !important; }
            .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; }
            .overlay-bg.active { display: block; }
        }

        /* --- DESKTOP RECOVERY (Wahi purana look) --- */
        @media screen and (min-width: 769px) {
            .mob-app-nav, .mob-menu-icon, .overlay-bg { display: none !important; }
        }

        /* Profile Dropdown fix */
        #profileBox { display: none; position: absolute; right: 0; top: 50px; background: white; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px; z-index: 10002; width: 150px; }
        #profileBox.show { display: block; }
    </style>
</head>
<body>
    <div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

    <div class="area">
        <ul class="circles">
            <li><i class="fa-solid fa-leaf"></i></li>
            <li><i class="fa-solid fa-seedling"></i></li>
            <li><i class="fa-solid fa-tree"></i></li>
            <li><i class="fa-solid fa-spa"></i></li>
            <li><i class="fa-solid fa-leaf"></i></li>
            <li><i class="fa-solid fa-seedling"></i></li>
        </ul>
    </div>

    <nav class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-bars mob-menu-icon" onclick="toggleSidebar()" style="cursor:pointer; margin-right:10px;"></i>
            <i class="fa-solid fa-seedling"></i> Om Sai Nursery
        </div>

        <div class="search-bar">
            <form action="{{ url_for('search') }}" method="GET" style="display: flex;">
                <input type="text" name="q" placeholder="Search plants, seeds...">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </div>

        <div class="user-actions">
            <div class="weather-widget">
                <i class="fa-solid fa-cloud-sun"></i> <span>28°C</span>
            </div>
            <button class="theme-toggle" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
            <div class="lang-switch">
                <a href="{{ url_for('set_language', lang_code='en') }}">EN</a> | <a href="{{ url_for('set_language', lang_code='hi') }}">HI</a>
            </div>
            <div class="profile-container" onclick="toggleProfile()" style="position:relative; cursor:pointer;">
                <i class="fa-solid fa-circle-user fa-2xl" style="color: #059669;"></i>
                <div id="profileBox">
                    <p><strong>{{ session['username']|default('User') }}</strong></p>
                    <hr>
                    <a href="/logout" style="color:red; text-decoration:none;"><i class="fa-solid fa-power-off"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <aside class="sidebar" id="sidebar">
            <h3 style="padding: 20px;">Dashboard</h3>
            <ul class="nav-links">
                <li><a href="/home"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="/plants"><i class="fa-solid fa-leaf"></i> Plants</a></li>
                <li><a href="/seeds"><i class="fa-solid fa-spa"></i> Seeds</a></li>
                <li><a href="/diseases"><i class="fa-solid fa-bug"></i> Diseases</a></li>
                <li><a href="/orders"><i class="fa-solid fa-cart-shopping"></i> Orders</a></li>
                <li><a href="/payments"><i class="fa-solid fa-wallet"></i> Payments</a></li>
                <li><a href="/feedback"><i class="fa-solid fa-comment-dots"></i> Feedback</a></li>
                <li><a href="/contact"><i class="fa-solid fa-phone"></i> Contact</a></li>
            </ul>
        </aside>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="mob-app-nav">
        <a href="/home" class="active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="/plants"><i class="fa-solid fa-leaf"></i>Plants</a>
        <a href="/orders"><i class="fa-solid fa-basket-shopping"></i>Cart</a>
        <a href="https://wa.me/919999999999"><i class="fa-brands fa-whatsapp"></i>Chat</a>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function toggleProfile() {
            document.getElementById('profileBox').classList.toggle('show');
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
        window.onload = () => {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            // Update cart count if needed
        };
    </script>
</body>
</html>
