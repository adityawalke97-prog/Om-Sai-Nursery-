{% extends "home.html" %}
{% block title %}Feedback{% endblock %}

{% block content %}
<h2>📝 Give Your Feedback</h2>

<form method="POST">
    <label><b>Choose Product:</b></label><br>
    {% if products %}
    <select name="product" required>
        <option value="" disabled selected>Select Product</option>
        {% for p in products %}
        <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
    </select>
    {% else %}
    <p style="color:red;">⚠️ No purchased products found</p>
    {% endif %}
    <br><br>
    <label><b>Your Feedback:</b></label><br>
    <textarea name="message" placeholder="Write your feedback..." required rows="5"></textarea>
    <br><br>
    <button type="submit">Submit Feedback</button>
</form>
{% endblock %}
